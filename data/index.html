<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レンジフード騒音検出器 - Wi-Fi設定</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #6e6e73;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #6e6e73;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    select, input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d2d2d7;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input:focus {
      border-color: #0071e3;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: #0071e3;
    }
    .slider-val {
      font-size: 14px;
      font-weight: 600;
      min-width: 54px;
      text-align: right;
    }
    button {
      margin-top: 28px;
      width: 100%;
      padding: 13px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #0077ed; }
    button:active { background: #005bbf; }
    button:disabled { background: #a1c4f0; cursor: not-allowed; }
    #status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }
    .ok  { color: #1a7f37; }
    .err { color: #cf222e; }
  </style>
</head>
<body>
<div class="card">
  <h1>Wi-Fi 設定</h1>
  <p class="subtitle">レンジフード騒音検出器</p>

  <form id="form">
    <label for="ssid">Wi-Fi ネットワーク</label>
    <select id="ssid" name="ssid" required>
      <option value="">スキャン中...</option>
    </select>

    <label for="pass">パスワード</label>
    <input type="password" id="pass" name="pass" placeholder="（オープンネットワークは空白）">

    <label for="ifttt_key">IFTTT Webhooks キー</label>
    <input type="text" id="ifttt_key" name="ifttt_key"
           placeholder="xxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">

    <label>騒音検出閾値</label>
    <div class="slider-row">
      <input type="range" id="threshold" name="threshold"
             min="55" max="85" step="1" value="65">
      <span class="slider-val"><span id="tval">65</span> dB</span>
    </div>

    <button type="submit" id="btn">保存して接続</button>
  </form>

  <div id="status"></div>
</div>

<script>
  // Update threshold display.
  const slider = document.getElementById('threshold');
  const tval   = document.getElementById('tval');
  slider.addEventListener('input', () => { tval.textContent = slider.value; });

  // Scan for Wi-Fi networks on load.
  fetch('/api/scan')
    .then(r => r.json())
    .then(data => {
      const sel = document.getElementById('ssid');
      sel.innerHTML = '';
      const networks = data.networks || [];
      if (networks.length === 0) {
        sel.innerHTML = '<option value="">ネットワークが見つかりません</option>';
      } else {
        networks.forEach(ssid => {
          const opt = document.createElement('option');
          opt.value = ssid;
          opt.textContent = ssid;
          sel.appendChild(opt);
        });
      }
    })
    .catch(() => {
      document.getElementById('ssid').innerHTML =
        '<option value="">スキャン失敗 — 手動入力してください</option>';
    });

  // Submit form.
  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.textContent = '送信中...';
    status.className   = '';

    const payload = {
      ssid:      document.getElementById('ssid').value,
      pass:      document.getElementById('pass').value,
      ifttt_key: document.getElementById('ifttt_key').value,
      threshold: parseFloat(slider.value),
    };

    try {
      const res = await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (res.ok) {
        status.textContent = '設定を保存しました。デバイスを再起動しています...';
        status.className   = 'ok';
      } else {
        throw new Error('HTTP ' + res.status);
      }
    } catch (err) {
      status.textContent = '保存に失敗しました: ' + err.message;
      status.className   = 'err';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
